app:
  name: hf-lob-analyzer
  version: "0.1.0"
  env: development
  log_level: DEBUG

api:
  host: "0.0.0.0"
  port: 8000
  workers: 4
  cors_origins:
    - "http://localhost:3000"
    - "http://localhost:8050"

orderbook:
  default_depth_levels: 10
  max_depth_levels: 50
  sequence_gap_tolerance: 0

features:
  ewma_spans: [10, 30, 60, 120]
  imbalance_levels: [1, 5, 10]
  rolling_window_seconds: 60

ingestion:
  reconnect_base_delay_seconds: 1.0
  reconnect_max_delay_seconds: 60.0
  reconnect_max_attempts: 10
  heartbeat_interval_seconds: 30

backtesting:
  default_commission_bps: 5
  default_slippage_bps: 2
  default_initial_capital: 100000
